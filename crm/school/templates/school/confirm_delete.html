{% extends 'school/base.html' %}
{% load school_tags %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-5 col-md-7">
  <div class="card border-0" style="border-radius:14px;box-shadow:0 2px 20px rgba(0,0,0,.08);">
    <div class="card-body p-4 text-center">
      <div style="width:60px;height:60px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:1.6rem;"></i>
      </div>
      <h5 class="fw-bold mb-2">{{ title }}</h5>
      <p class="text-muted mb-4" style="font-size:.88rem;">
        តើអ្នកប្រាកដថាចង់លុប <strong>{{ object }}</strong>?<br>
        <span class="text-danger" style="font-size:.78rem;">សកម្មភាពនេះមិនអាចត្រឡប់វិញបានទេ។</span>
      </p>
      <form method="post" class="d-flex gap-3 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">
          <i class="bi bi-trash me-1"></i>លុបចោល
        </button>
        <a href="{{ back_url }}" class="btn btn-outline-secondary px-4">
          <i class="bi bi-arrow-left me-1"></i>ត្រឡប់ក្រោយ
        </a>
      </form>
    </div>
  </div>
</div>
</div>
{% endblock %}
